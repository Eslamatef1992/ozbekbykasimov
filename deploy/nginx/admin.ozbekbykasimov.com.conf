# Admin panel - served as static build from the Vite "dist" output
server {
    listen 80;
    server_name admin.ozbekbykasimov.com;

    root /var/www/ozbek/admin/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 30d;
        access_log off;
    }
}
