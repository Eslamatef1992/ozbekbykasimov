# Customer site - served as static build from the Vite "dist" output
server {
    listen 80;
    server_name www.ozbekbykasimov.com ozbekbykasimov.com;

    root /var/www/ozbek/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 30d;
        access_log off;
    }
}
